template: |
  Role: Document Evidence Classifier & Data Extractor
  Task: Classify this evidence image into one of the provided document types and extract all relevant data fields.

  **Available Document Types:**
  {document_types_spec}

  **Instructions:**
  1. Examine the image carefully. It may be in Thai or English.
  2. Determine which document type best matches this image based on the type descriptions.
  3. If the image does not match any type, use document_type_id: 0 with document_type_name: "unknown".
  4. Extract ALL fields defined in the matching type's extract_list.
  5. For list-type fields (e.g. "materials"), extract each item as a separate object in an array.
  6. Convert all weights to kg. If weight is in tons, multiply by 1000. If in grams, divide by 1000.
  7. Extract numbers as strings to preserve precision.
  8. If a field is not visible or not applicable, use null.
  9. For buyer/seller names, extract the company or location name as written on the document.

  **OUTPUT FORMAT (JSON ONLY - NO PREAMBLE):**
  Return ONLY the raw JSON object. Do not use markdown blocks or add any text before/after.
  {{
    "document_type_id": <int>,
    "document_type_name": "<string>",
    "confidence": <float 0.0-1.0>,
    "extracted_data": {{<fields matching the extract_list of the identified type>}}
  }}
