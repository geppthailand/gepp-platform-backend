      - { key: "responsible",  label_th: "ผู้รับผิดชอบข้อมูล", label_en: "Owner",  type: "text",   width: 18 }
      - { key: "evidence_ref", label_th: "หลักฐาน/เอกสารอ้างอิง", label_en: "Evidence", type: "text", width: 32 }
      - { key: "unit",         label_th: "หน่วย",  label_en: "Unit",         type: "text",   width: 14 }
    has_total: true

  - id: 4
    sheet_name: "Scope 3.4"
