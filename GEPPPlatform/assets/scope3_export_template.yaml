# Style constants — applied uniformly so every sheet looks the same.
style:
  font_family: "Sarabun"            # Falls back to the workbook's default if Sarabun isn't installed
  font_family_fallback: "Calibri"
  title_size: 12
  header_size: 11
  body_size: 11
  title_color: "0B1120"             # ink — matches the rest of the GEPP-ESG palette
  header_fill: "ECFDF5"
  header_font_color: "047857"
  border_color: "E2E8F0"
  zebra_fill: "FAFBFC"

# Header block printed at the top of every detail sheet — verbatim
# match against the source file so an auditor's eye finds it exactly
# where they expect.
sheet_header:
  title_row:    { row: 1, col: 1, value_th: "3 การปล่อยก๊าซเรือนกระจกทางอ้อมอื่นๆ (Indirect GHG emissions)", merge_to_col: 8 }
  topic_row:    { row: 2, key_col: 1, value_col: 2, key_th: "เรื่อง :" }
  period_row:   { row: 3, key_col: 1, value_col: 2, key_th: "ระยะเวลาเก็บข้อมูล :", value_format: "{month_start_th} - {month_end_th} {year}" }
  table_start_row: 5

# Static phrase used when a cat has zero records (placeholder cats
# 3, 4, 8, 13, 14, 15).
no_activity:
  th: "ไม่มีกิจกรรม"
  en: "NO ACTIVITY"
  cell: { row: 5, col: 2 }

