# =====================================================================
# scope3_export_template.yaml
# ---------------------------------------------------------------------
# Layout-only schema for the TGO CFO Scope-3 audit workbook.
#
# Source: /Users/geppsa-ard/Documents/Workspace/platforms/T-Ver-sheet
# CFO_GHG Emissions.xlsx — only the **layout** was extracted; no values
# were copied. Customer data is filled at write time from `esg_records`.
#
# Consumers: EsgScope3ExportService (this file's primary user) and any
# future export/import helpers that need the canonical Scope-3 sheet
# shape (e.g. an admin-portal "Bulk import TGO workbook" feature).
#
# Notes for writers:
#   • Every detail sheet starts with a fixed 3-line header block
#     (`title`, "เรื่อง :", "ระยะเวลาเก็บข้อมูล :").
#   • `placeholder_cats` (3, 4, 8, 13, 14, 15) often have no activity
#     in real org data; the writer renders a "ไม่มีกิจกรรม / NO ACTIVITY"
#     stub when the org has zero records under that cat. When records
#     DO exist, fall back to the generic_table layout so the audit
#     trail is not lost.
#   • Sheet 6 (Business Travel) and Sheet 2 (Capital Goods) follow a
#     flat-list convention rather than a monthly pivot. The writer
#     branches by `kind`.
#   • Coordinates are 1-indexed (matches openpyxl).
# =====================================================================
version: 1

# Sheet 1 — % GHG scope 3 summary
summary:
  sheet_name: "% GHG scope 3"
  header_row: 2
  data_start_row: 3
  columns:
    - { col: 1, label_th: "หมวด",                label_en: "No.",      key: "scope3_id",        type: "int",    width: 8 }
    - { col: 2, label_th: "ประเภท (Category)",   label_en: "Category", key: "category_label",   type: "text",   width: 80 }
    - { col: 3, label_th: "Est. GHG (ton CO2e)", label_en: "tCO2e",    key: "tco2e",            type: "number", number_format: "#,##0.0000", width: 18 }
    - { col: 4, label_th: "%",                   label_en: "Pct",      key: "pct_of_total",     type: "number", number_format: "0.00%",       width: 10 }

# 15 detail sheets — one per Scope-3 category. Bilingual labels stay
# verbatim with the T-Ver source so an auditor sees a familiar layout.
categories:
  - id: 1
    sheet_name: "Scope 3.1"
    title_th: "1. Purchased goods and services"
    title_en: "Purchased goods and services"
    kind: "monthly"
    columns:
      - { key: "seq",            label_th: "ลำดับ",   label_en: "No.",  type: "int",    width: 8 }
      - { key: "record_label",   label_th: "รายการ",  label_en: "Item", type: "text",   width: 50 }
      - { key: "unit",           label_th: "หน่วย",   label_en: "Unit", type: "text",   width: 14 }
    has_total: true
    has_notes: true
  - id: 2
    sheet_name: "Scope 3.2"
    title_th: "2. Capital goods (ทรัพย์สินทุน)"
    title_en: "Capital goods"
    kind: "asset_register"
    columns:
      - { key: "seq",                    label_th: "ลำดับ",          label_en: "No.",         type: "int",    width: 8 }
      - { key: "record_label",           label_th: "ทรัพย์สิน",        label_en: "Asset",       type: "text",   width: 40 }
      - { key: "datapoint:asset_type",   label_th: "ประเภท",          label_en: "Type",        type: "text",   width: 18 }
      - { key: "datapoint:purchase_date", label_th: "วันที่ซื้อ",      label_en: "Purchase Date", type: "date",  width: 14 }
      - { key: "datapoint:quantity",     label_th: "จำนวน",           label_en: "Qty",         type: "number", width: 10 }
      - { key: "unit",                   label_th: "หน่วย",           label_en: "Unit",        type: "text",   width: 12 }
      - { key: "datapoint:unit_cost",    label_th: "ราคาต่อหน่วย",    label_en: "Unit Cost",   type: "number", number_format: "#,##0.00", width: 14 }
      - { key: "datapoint:total_cost",   label_th: "มูลค่ารวม (บาท)", label_en: "Total Cost",  type: "number", number_format: "#,##0.00", width: 16 }
      - { key: "kgco2e",                 label_th: "kgCO2e",          label_en: "kgCO2e",      type: "number", number_format: "#,##0.0000", width: 14 }
      - { key: "evidence_ref",           label_th: "หลักฐาน/เอกสารอ้างอิง", label_en: "Evidence", type: "text", width: 40 }

  - id: 3
    sheet_name: "Scope 3.3"
    title_th: "3. กิจกรรมที่เกี่ยวข้องกับเชื้อเพลิงและพลังงาน (ไม่รวมอยู่ใน Scope 1 หรือ Scope 2) (Fuel- and energy-related activities)"
    title_en: "Fuel- and energy-related activities"
    kind: "monthly"
    placeholder: true
