# Industry catalogue for Q1 of the materiality filter.
#
# Each industry has:
#   id          — stable identifier referenced in scoring + show_when rules
#   labels      — { en, th }
#   default_category_seeds  — { category_id: weight } that pre-seeds the score
#                             before any later question runs. Magnitudes are
#                             roughly aligned with the sector materiality
#                             guidance in
#                             docs/Services/GEPP-ESG/mvp1.1/scope3_deep_dive.html
#                             lines 863–903.
#
# "Other" is appended automatically by the renderer (it gets free_text: true);
# don't define it here. When a user picks "Other", we apply *no* industry seed —
# the later questions do all the categorisation work.

industries:

  - id: manufacturing
    labels: { en: Manufacturing — General, th: การผลิต — ทั่วไป }
    default_category_seeds:
      1: 0.7
      2: 0.4
      3: 0.5
      4: 0.5
      5: 0.5
      9: 0.4
      11: 0.4
      12: 0.4

